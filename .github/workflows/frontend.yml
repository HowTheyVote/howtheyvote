name: Frontend CI

on:
  push:
    branches: ["main"]
  pull_request: {}

jobs:
  build:
    runs-on: ubuntu-26.04-arm

    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          load: true
          tags: frontend
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run linter
        run: docker run --rm frontend make lint

      - name: Run types
        run: docker run --rm frontend make typecheck

      - name: Run tests
        run: docker run --rm frontend make test
