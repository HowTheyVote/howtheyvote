name: Docker images

on:
  workflow_dispatch: {}
  push:
    branches: ["main"]
  pull_request: {}

permissions:
  contents: read
  packages: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.set.outputs.images }}
    steps:
      - id: set
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo 'images=["frontend","backend","caddy"]' >> "$GITHUB_OUTPUT"
          else
            echo 'images=["frontend","backend"]' >> "$GITHUB_OUTPUT"
          fi
  docker:
    needs: prepare 
    runs-on: ubuntu-26.04-arm

    strategy:
      matrix:
        image: ${{ fromJson(needs.prepare.outputs.images) }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      # Required to build multi-platform images
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Automatically tags Docker images based on Git tags, branches etc.
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}-${{ matrix.image }}

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        if: ${{ github.event_name == 'workflow_dispatch' }}
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.image }}
          platforms: linux/arm64
          push: ${{ github.event_name == 'workflow_dispatch' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
